{% extends "base.html" %}
{% block title %}Formule{% endblock %}
{% block content %}
<div class="card">
  <h2>{% if instance %}Modifier la formule{% else %}Nouvelle formule{% endif %}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="btn-row">
      <button class="btn" type="submit">Enregistrer</button>
      <a class="btn btn-secondary" href="{% url 'core:formule_list' %}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
