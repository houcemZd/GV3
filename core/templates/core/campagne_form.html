{% extends "base.html" %}
{% block title %}Nouvelle campagne{% endblock %}
{% block content %}
<div class="card">
  <h2>Nouvelle campagne</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="btn-row">
      <button class="btn" type="submit">Créer la campagne</button>
      <a class="btn btn-secondary" href="{% url 'core:campagne_list' %}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
